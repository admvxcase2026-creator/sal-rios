<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrativo Estoque — Salários</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f1f5;
    --border: #e2e4ec;
    --accent: #4f6ef7;
    --accent2: #0cc8b0;
    --danger: #e84545;
    --warn: #f5a623;
    --text: #1a1d2e;
    --muted: #8b90a7;
    --card: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .header-title {
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-right { display: flex; align-items: center; gap: 14px; }

  .mode-badge {
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .mode-badge.admin { background: #eef1ff; color: var(--accent); }
  .mode-badge.viewer { background: var(--surface2); color: var(--muted); }
  .mode-badge.employee { background: #e8faf8; color: var(--accent2); }

  .btn-small {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main { max-width: 1100px; margin: 0 auto; padding: 36px 24px; }

  /* TELA SELEÇÃO */
  #screen-select {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  .select-header { text-align: center; }

  .select-header h1 {
    font-weight: 800;
    font-size: 38px;
    color: var(--text);
    line-height: 1.1;
  }

  .select-header h1 span { color: var(--accent); }
  .select-header p { margin-top: 10px; color: var(--muted); font-size: 14px; }

  .employee-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 460px;
  }

  .employee-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 18px 22px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .employee-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(79,110,247,0.12);
  }

  .employee-name { font-weight: 700; font-size: 15px; color: var(--text); }
  .employee-salary { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card-arrow { color: var(--accent); font-size: 18px; font-weight: 700; }

  .admin-entry { display: flex; align-items: center; gap: 10px; }

  .admin-entry input {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .admin-entry input:focus { border-color: var(--accent); }

  .btn-accent {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    padding: 10px 22px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn-accent:hover { opacity: 0.88; }

  .btn-outline {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    padding: 10px 22px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-outline:hover { background: #eef1ff; }

  .btn-danger {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    padding: 8px 18px;
    background: transparent;
    color: var(--danger);
    border: 1.5px solid var(--danger);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* DASHBOARD */
  .dashboard-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .dashboard-title h2 { font-weight: 800; font-size: 26px; color: var(--text); }
  .dashboard-title p { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 28px;
    background: var(--surface2);
    padding: 4px;
    border-radius: 12px;
    width: fit-content;
  }

  .tab {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 8px 20px;
    cursor: pointer;
    color: var(--muted);
    border: none;
    background: transparent;
    border-radius: 9px;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--surface); color: var(--accent); box-shadow: var(--shadow); }

  /* SUMMARY CARDS */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    box-shadow: var(--shadow);
  }

  .summary-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
  .summary-value { font-weight: 800; font-size: 22px; color: var(--text); }
  .summary-value.green { color: #1aab7a; }
  .summary-value.red { color: var(--danger); }
  .summary-value.blue { color: var(--accent2); }
  .summary-value.accent { color: var(--accent); }
  .summary-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* CALC TABLE */
  .calc-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .calc-table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
  }

  .calc-table-title { font-weight: 700; font-size: 13px; color: var(--text); }

  .calc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
  }
  .calc-row:last-child { border-bottom: none; }
  .calc-row.total { background: #f7f8ff; font-weight: 700; }

  .calc-row-label { color: var(--muted); }
  .calc-row-value.neg { color: var(--danger); }
  .calc-row-value.pos { color: #1aab7a; }
  .calc-row-value.neutral { color: var(--accent2); }

  /* SECTION TITLE */
  .section-title {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .section-title .dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }

  .form-input, .form-select {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    font-weight: 500;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }

  /* FALTAS TABLE */
  .faltas-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .faltas-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    background: var(--surface2);
  }

  .faltas-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .faltas-table tr:last-child td { border-bottom: none; }

  .type-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .type-badge.falta { background: #ffebeb; color: var(--danger); }
  .type-badge.folga { background: #fff4e0; color: var(--warn); }
  .type-badge.atestado { background: #e8faf8; color: var(--accent2); }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .btn-del:hover { color: var(--danger); background: #ffebeb; }

  /* DIREITOS */
  .direitos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 16px; }

  .direito-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .direito-icon { font-size: 26px; margin-bottom: 12px; }
  .direito-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .direito-desc { font-size: 12px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .direito-value { font-weight: 800; font-size: 30px; color: var(--accent); }
  .direito-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ESCALA INFO */
  .escala-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-around;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .escala-info-item { text-align: center; }
  .escala-info-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; font-weight: 600; text-transform: uppercase; }
  .escala-info-val { font-weight: 800; font-size: 22px; color: var(--accent); }

  /* JANELA */
  .janela-info {
    background: #eef1ff;
    border: 1px solid #c7d0f8;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 12px;
    color: #4a5280;
    margin-bottom: 20px;
    line-height: 1.6;
    font-weight: 500;
  }
  .janela-info strong { color: var(--accent); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 24px 0; }

  /* ADMIN ACTIONS */
  .admin-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: #1aab7a; color: #1aab7a; }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .loader {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 13px; }

  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    main { padding: 20px 16px; }
    .select-header h1 { font-size: 28px; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .tabs { width: 100%; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-title">Administrativo Estoque</div>
  <div class="header-right">
    <span class="mode-badge viewer" id="mode-badge">VISUALIZAÇÃO</span>
    <button class="btn-small" id="btn-logout" onclick="logout()" style="display:none">← Sair</button>
  </div>
</header>

<!-- TELA SELEÇÃO -->
<main id="screen-select">
  <div class="select-header">
    <h1>Controle de <span>Salários</span></h1>
    <p>Selecione seu nome para ver ou lançar seus dados</p>
  </div>

  <div class="employee-grid" id="employee-list"></div>

  <div style="text-align:center;">
    <div style="font-size:11px; color:var(--muted); margin-bottom:10px; font-weight:600; letter-spacing:0.08em;">ACESSO ADMINISTRATIVO</div>
    <div class="admin-entry">
      <input type="password" id="admin-pw" placeholder="Senha admin" onkeydown="if(event.key==='Enter') adminLogin()">
      <button class="btn-accent" onclick="adminLogin()">Entrar</button>
    </div>
    <div id="pw-error" style="font-size:12px; color:var(--danger); margin-top:8px; display:none; font-weight:600;">Senha incorreta</div>
  </div>
</main>

<!-- DASHBOARD -->
<main id="screen-dashboard" style="display:none;">
  <div class="dashboard-header">
    <div class="dashboard-title">
      <h2 id="dash-name"></h2>
      <p id="dash-sub"></p>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;" id="admin-controls"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('salario', this)">SALÁRIO</button>
    <button class="tab" onclick="switchTab('escala', this)">ESCALA & FALTAS</button>
    <button class="tab" onclick="switchTab('direitos', this)">DIREITOS</button>
  </div>

  <!-- ABA SALÁRIO -->
  <div id="tab-salario">
    <div class="summary-grid" id="salary-summary"></div>
    <div id="calc-breakdown"></div>
    <div id="altr-breakdown"></div>
  </div>

  <!-- ABA ESCALA & FALTAS -->
  <div id="tab-escala" style="display:none;">
    <div class="janela-info" id="janela-display"></div>
    <div class="escala-info" id="escala-display"></div>

    <div class="section-title"><div class="dot"></div>Ocorrências na Janela</div>
    <div class="calc-table">
      <table class="faltas-table">
        <thead>
          <tr>
            <th>Data</th>
            <th>Tipo</th>
            <th>Obs</th>
            <th id="th-del" style="display:none">Excluir</th>
          </tr>
        </thead>
        <tbody id="faltas-body"></tbody>
      </table>
    </div>

    <!-- FORM EDIÇÃO (funcionária ou admin) -->
    <div id="edit-form" style="display:none;">
      <div class="divider"></div>
      <div class="section-title"><div class="dot"></div>Lançar Escala</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Mês de Referência</label>
          <input type="month" class="form-input" id="f-mes-ref">
        </div>
        <div class="form-group">
          <label class="form-label">Dias a Trabalhar</label>
          <input type="number" class="form-input" id="f-dias" min="1" max="31" placeholder="Ex: 20">
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn-accent" onclick="salvarEscala()">Salvar Escala</button>
      </div>

      <div class="divider"></div>
      <div class="section-title"><div class="dot"></div>Registrar Falta / Folga / Atestado</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" class="form-input" id="f-data">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="f-tipo">
            <option value="falta">Falta</option>
            <option value="folga">Folga</option>
            <option value="atestado">Atestado</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Observação (opcional)</label>
          <input type="text" class="form-input" id="f-obs" placeholder="Ex: saúde">
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn-accent" onclick="salvarFalta()">Registrar</button>
      </div>
    </div>
  </div>

  <!-- ABA DIREITOS -->
  <div id="tab-direitos" style="display:none;">
    <div class="direitos-grid" id="direitos-grid"></div>
  </div>
</main>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-loading">
  <div style="background:#fff; padding:20px 28px; border-radius:14px; font-size:13px; font-weight:600; color:var(--accent); box-shadow:0 8px 32px rgba(0,0,0,0.12);">
    <span class="loader"></span> Carregando...
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';

const FUNCIONARIOS = [

// ===== INSS =====
function calcINSS(bruto) {
  const faixas = [
    { ate: 1518.00, aliq: 0.075 },
    { ate: 2793.88, aliq: 0.09 },
    { ate: 4190.83, aliq: 0.12 },
    { ate: 8157.41, aliq: 0.14 },
  ];
  let inss = 0, anterior = 0;
  for (const f of faixas) {
    if (bruto <= 0) break;
    const faixa = Math.min(bruto, f.ate) - anterior;
    if (faixa <= 0) continue;
    inss += faixa * f.aliq;
    anterior = f.ate;
    if (bruto <= f.ate) break;
  }
  return Math.min(inss, bruto);
}

// ===== IRRF =====
function calcIRRF(bruto, inss) {
  const base = bruto - inss;
  const faixas = [
    { ate: 2259.20, aliq: 0, ded: 0 },
    { ate: 2826.65, aliq: 0.075, ded: 169.44 },
    { ate: 3751.05, aliq: 0.15, ded: 381.44 },
    { ate: 4664.68, aliq: 0.225, ded: 662.77 },
    { ate: Infinity, aliq: 0.275, ded: 896.00 },
  ];
  let irrf = 0;
  for (const f of faixas) {
    if (base <= f.ate) { irrf = base * f.aliq - f.ded; break; }
  }
  const comSimplificado = Math.max(0, irrf - 564.80);
  return Math.max(0, Math.min(irrf, comSimplificado));
}

// ===== JANELA =====
function getJanela(mesRef) {
  const [ano, mes] = mesRef.split('-').map(Number);
  const mesAnt = mes === 1 ? 12 : mes - 1;
  const anoAnt = mes === 1 ? ano - 1 : ano;
  return {
    inicio: new Date(anoAnt, mesAnt - 1, 1),
    fim: new Date(ano, mes - 1, 12)
  };
}

function dateInJanela(dateStr, mesRef) {
  const { inicio, fim } = getJanela(mesRef);
  const d = new Date(dateStr + 'T12:00:00');
  return d >= inicio && d <= fim;
}

function formatDate(s) {
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function mesNome(mesRef) {
  const [ano, mes] = mesRef.split('-').map(Number);
  const n = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${n[mes-1]}/${ano}`;
}

function mesNomeLong(mesRef) {
  const [ano, mes] = mesRef.split('-').map(Number);
  const n = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${n[mes-1]}/${ano}`;
}

function getCurrentMesRef() {
  // Após dia 12, o lançamento já é para o mês seguinte
  const now = new Date();
  const dia = now.getDate();
  const mes = dia > 12 ? now.getMonth() + 2 : now.getMonth() + 1;
  const ano = mes > 12 ? now.getFullYear() + 1 : now.getFullYear();
  const mesAdj = mes > 12 ? 1 : mes;
  return `${ano}-${String(mesAdj).padStart(2,'0')}`;
}

// ===== CÁLCULO =====
function calcularSalario(func, escala, faltasJanela) {
  const bruto = func.salario;
  const diasEscala = escala ? escala.dias : 0;
  const diasMes = diasEscala || 30;

  const faltas = faltasJanela.filter(f => f.tipo !== 'atestado');
  const atestados = faltasJanela.filter(f => f.tipo === 'atestado');
  const totalFaltas = faltas.length;
  const totalAtestados = atestados.length;
  const totalOcorrencias = totalFaltas + totalAtestados;

  const descontoFaltas = totalFaltas > 0 ? (bruto / diasMes) * totalFaltas : 0;
  const salarioBrutoFinal = bruto - descontoFaltas;

  const inss = calcINSS(salarioBrutoFinal);
  const irrf = calcIRRF(salarioBrutoFinal, inss);
  const liquido = salarioBrutoFinal - inss - irrf;

  const altr_bruto = diasEscala * (AL_DIA + TR_DIA);
  const altr_desconto = totalOcorrencias * (AL_DIA + TR_DIA);
  const altr_liquido = Math.max(0, altr_bruto - altr_desconto);

  const totalReceber = liquido + altr_liquido;

  return { bruto, salarioBrutoFinal, descontoFaltas, inss, irrf, liquido,
    diasEscala, totalFaltas, totalAtestados, totalOcorrencias,
    altr_bruto, altr_desconto, altr_liquido, totalReceber };
}

  const faltasJanelaLocal = faltasJanela;

  document.getElementById('calc-breakdown').innerHTML = `

      ${c.descontoFaltas > 0 ? `<div class="calc-row"><span class="calc-row-label">Desconto Faltas (${c.totalFaltas} dia${c.totalFaltas>1?'s':''})</span><span class="calc-row-value neg">− ${fmt(c.descontoFaltas)}</span></div>` : ''}
      <div class="calc-row"><span class="calc-row-label">Base de Cálculo</span><span class="calc-row-value">${fmt(c.salarioBrutoFinal)}</span></div>
      <div class="calc-row"><span class="calc-row-label">INSS (progressivo)</span><span class="calc-row-value neg">− ${fmt(c.inss)}</span></div>
      <div class="calc-row"><span class="calc-row-label">IRRF${c.irrf===0?' (Isento)':''}</span><span class="calc-row-value neg">− ${fmt(c.irrf)}</span></div>
      <div class="calc-row total"><span class="calc-row-label" style="color:var(--text)">Líquido</span><span class="calc-row-value pos">${fmt(c.liquido)}</span></div>
    </div>
  `;

  const diasLiq = Math.max(0, c.diasEscala - c.totalOcorrencias);
  const ocorrenciasRows = faltasJanela.map(f =>

  document.getElementById('altr-breakdown').innerHTML = `

      </div>

      <div class="calc-row"><span class="calc-row-label">Transporte (R$ ${TR_DIA}/dia — ida e volta)</span><span class="calc-row-value neutral">${fmt(diasLiq * TR_DIA)}</span></div>

// ===== RENDER ESCALA =====
function renderEscala(func, escala, faltasJanela, mesRef) {
  const { inicio, fim } = getJanela(mesRef);
  const mA = inicio.getMonth(); const aA = inicio.getFullYear();
  const mF = fim.getMonth(); const aF = fim.getFullYear();
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  document.getElementById('janela-display').innerHTML = `
    <strong>Janela ativa para ${mesNome(mesRef)}:</strong>
    Todo o mês de <strong>${meses[mA]}/${aA}</strong> + dias 1 a 12 de <strong>${meses[mF]}/${aF}</strong>
    &nbsp;·&nbsp; <strong>${faltasJanela.length} ocorrência(s)</strong> encontrada(s)
  `;

  document.getElementById('escala-display').innerHTML = `
    <div class="escala-info-item"><div class="escala-info-label">Referência</div><div class="escala-info-val">${mesNome(mesRef)}</div></div>
    <div class="escala-info-item"><div class="escala-info-label">Dias Escala</div><div class="escala-info-val">${escala ? escala.dias : '—'}</div></div>
    <div class="escala-info-item"><div class="escala-info-label">Faltas/Folgas</div><div class="escala-info-val" style="color:var(--danger)">${faltasJanela.filter(f=>f.tipo!=='atestado').length}</div></div>
    <div class="escala-info-item"><div class="escala-info-label">Atestados</div><div class="escala-info-val" style="color:var(--accent2)">${faltasJanela.filter(f=>f.tipo==='atestado').length}</div></div>
  `;

  const canEdit = currentMode === 'employee' || currentMode === 'admin';
  const canDelete = currentMode === 'admin' || currentMode === 'employee';

  document.getElementById('th-del').style.display = canDelete ? '' : 'none';

  const tbody = document.getElementById('faltas-body');
  if (faltasJanela.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="empty-state">Nenhuma ocorrência na janela</td></tr>`;
  } else {
    tbody.innerHTML = faltasJanela.map(f => `
      <tr>
        <td>${formatDate(f.data)}</td>
        <td><span class="type-badge ${f.tipo}">${f.tipo.toUpperCase()}</span></td>
        <td style="color:var(--muted)">${f.obs || '—'}</td>
        <td>${canDelete ? `<button class="btn-del" onclick="deletarFalta('${f.id}')">✕</button>` : ''}</td>
      </tr>
    `).join('');
  }

  if (canEdit) {
    document.getElementById('edit-form').style.display = 'block';
    document.getElementById('f-mes-ref').value = mesRef;
    if (!document.getElementById('f-data').value) {
      document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
    }
  } else {
    document.getElementById('edit-form').style.display = 'none';
  }
}

// ===== RENDER DIREITOS =====
function renderDireitos(func) {
  const bruto = func.salario;
  const inss = calcINSS(bruto);
  const irrf = calcIRRF(bruto, inss);
  const liquido = bruto - inss - irrf;
  const ferias = liquido + (liquido / 3);
  const decimo = (bruto / 12) * MESES_ANO;
  const fgts = bruto * 0.08 * MESES_ANO;

  document.getElementById('direitos-grid').innerHTML = `
    <div class="direito-card">
      <div class="direito-icon">🏖️</div>
      <div class="direito-name">Férias</div>
      <div class="direito-desc">Salário líquido + 1/3 constitucional sobre o líquido.</div>
      <div class="direito-value">${fmt(ferias)}</div>
      <div class="direito-sub">Inclui 1/3 = ${fmt(liquido/3)}</div>
    </div>
    <div class="direito-card">
      <div class="direito-icon">🎄</div>
      <div class="direito-name">13º Salário</div>
      <div class="direito-desc">Base anual completa (12 meses) sobre o salário bruto.</div>
      <div class="direito-value">${fmt(decimo)}</div>
      <div class="direito-sub">${fmt(bruto/12)}/mês acumulado</div>
    </div>
    <div class="direito-card">
      <div class="direito-icon">🏦</div>
      <div class="direito-name">FGTS Estimado</div>
      <div class="direito-desc">8% do salário bruto × 12 meses no ano.</div>
      <div class="direito-value">${fmt(fgts)}</div>
      <div class="direito-sub">${fmt(bruto*0.08)}/mês depositado</div>
    </div>
  `;
}

// ===== SUPABASE =====
async function loadData(funcId) {
  showLoading(true);
  try {
    const [{ data: escalas }, { data: faltas }] = await Promise.all([
      db.from('salarios_escalas').select('*').eq('funcionario_id', funcId).order('mes_ref', { ascending: false }),
      db.from('salarios_faltas').select('*').eq('funcionario_id', funcId).order('data', { ascending: true })
    ]);
    allEscalas = escalas || [];
    allFaltas = faltas || [];
  } catch(e) {
    toast('Erro ao carregar dados', 'error');
  }
  showLoading(false);
}

async function salvarEscala() {
  const mesRef = document.getElementById('f-mes-ref').value;
  const dias = parseInt(document.getElementById('f-dias').value);
  if (!mesRef || !dias || dias < 1) { toast('Preencha mês e dias', 'error'); return; }
  showLoading(true);
  const { error } = await db.from('salarios_escalas').upsert(
    { funcionario_id: currentFunc.id, mes_ref: mesRef, dias },
    { onConflict: 'funcionario_id,mes_ref' }
  );
  showLoading(false);
  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Escala salva!', 'success');
  await loadData(currentFunc.id);
  renderDashboard();
}

async function salvarFalta() {
  const data = document.getElementById('f-data').value;
  const tipo = document.getElementById('f-tipo').value;
  const obs = document.getElementById('f-obs').value;
  if (!data) { toast('Informe a data', 'error'); return; }
  showLoading(true);
  const { error } = await db.from('salarios_faltas').insert({ funcionario_id: currentFunc.id, data, tipo, obs });
  showLoading(false);
  if (error) { toast('Erro: ' + error.message, 'error'); alert('Erro ao registrar: ' + error.message + ' | Code: ' + error.code); return; }
  toast('Registrado!', 'success');
  document.getElementById('f-obs').value = '';
  await loadData(currentFunc.id);
  renderDashboard();
}

async function deletarFalta(id) {
  showLoading(true);
  const { error } = await db.from('salarios_faltas').delete().eq('id', id);
  showLoading(false);
  if (error) { toast('Erro ao deletar', 'error'); return; }
  toast('Removido', 'success');
  await loadData(currentFunc.id);
  renderDashboard();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const mesRef = getCurrentMesRef();
  const escala = allEscalas.find(e => e.mes_ref === mesRef) || allEscalas[0];
  const escalaRef = escala ? escala.mes_ref : mesRef;
  const faltasJanela = allFaltas.filter(f => dateInJanela(f.data, escalaRef));

  renderSalario(currentFunc, escala, faltasJanela);
  renderEscala(currentFunc, escala, faltasJanela, escalaRef);
  renderDireitos(currentFunc);
}

async function openDashboard(func, mode) {
  currentFunc = func;
  currentMode = mode;

  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'block';
  document.getElementById('btn-logout').style.display = '';

  const primeiroNome = func.nome.split(' ')[0];
  document.getElementById('dash-name').textContent = func.nome;
  document.getElementById('dash-sub').textContent =
    mode === 'admin' ? 'Modo Administrador' :
    mode === 'employee' ? `Olá, ${primeiroNome}! Seus dados abaixo.` :
    'Visualização';

  const badge = document.getElementById('mode-badge');
  if (mode === 'admin') { badge.className = 'mode-badge admin'; badge.textContent = 'ADMIN'; }
  else if (mode === 'employee') { badge.className = 'mode-badge employee'; badge.textContent = primeiroNome.toUpperCase(); }
  else { badge.className = 'mode-badge viewer'; badge.textContent = 'VISUALIZAÇÃO'; }

  // Botões de troca (admin)
  if (mode === 'admin') {
    document.getElementById('admin-controls').innerHTML = FUNCIONARIOS.map(f =>
      `<button class="btn-small" onclick="openDashboard(FUNCIONARIOS.find(x=>x.id==='${f.id}'),'admin')"
        style="${f.id===func.id?'border-color:var(--accent);color:var(--accent);':''}">${f.nome.split(' ')[0]}</button>`
    ).join('');
  } else {
    document.getElementById('admin-controls').innerHTML = '';
  }

  switchTab('salario', document.querySelector('.tab'));
  await loadData(func.id);
  renderDashboard();
}

function logout() {
  isAdmin = false;
  currentFunc = null;
  currentMode = 'view';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'none';
  document.getElementById('screen-select').style.display = '';
  document.getElementById('admin-pw').value = '';
  document.getElementById('pw-error').style.display = 'none';
  renderSelect();
  document.getElementById('mode-badge').className = 'mode-badge viewer';
  document.getElementById('mode-badge').textContent = 'VISUALIZAÇÃO';
}

function switchTab(tab, el) {
  ['salario','escala','direitos'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
}

function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('pw-error').style.display = 'none';
    openDashboard(FUNCIONARIOS[0], 'admin');
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

function renderSelect() {
  document.getElementById('employee-list').innerHTML = FUNCIONARIOS.map(f => `
    <div class="employee-card" onclick="openDashboard(FUNCIONARIOS.find(x=>x.id==='${f.id}'),'employee')">
      <div>
        <div class="employee-name">${f.nome}</div>
        <div class="employee-salary">Administrativo Estoque</div>
      </div>
      <div class="card-arrow">→</div>
    </div>
  `).join('');
}

function fmt(val) {
  return 'R$ ' + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.className = 'toast', 3000);
}

function showLoading(show) {
  document.getElementById('modal-loading').classList.toggle('open', show);
}

renderSelect();
</script>
