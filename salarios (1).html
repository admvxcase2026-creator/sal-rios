<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrativo Estoque — Salários</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c1f;
    --border: #2a2a2e;
    --accent: #e8ff47;
    --accent2: #47ffe0;
    --danger: #ff4747;
    --warn: #ffaa47;
    --text: #f0f0f0;
    --muted: #6b6b70;
    --card: #181820;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .mode-badge {
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 2px;
    font-weight: 500;
  }

  .mode-badge.admin { background: var(--accent); color: #000; }
  .mode-badge.viewer { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

  .btn-small {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* TELA DE SELEÇÃO */
  #screen-select {
    min-height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .select-header {
    text-align: center;
  }

  .select-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 42px;
    line-height: 1;
    color: var(--text);
  }

  .select-header h1 span { color: var(--accent); }

  .select-header p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .employee-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .employee-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .employee-card:hover {
    border-color: var(--accent);
    background: #1a1a22;
    transform: translateX(4px);
  }

  .employee-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 15px;
  }

  .employee-salary {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .card-arrow { color: var(--accent); font-size: 18px; }

  .admin-entry {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .admin-entry input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }

  .admin-entry input:focus { border-color: var(--accent); }

  .btn-accent {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .btn-accent:hover { opacity: 0.85; }

  .btn-danger {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    border-radius: 3px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: var(--danger); color: #fff; }

  /* DASHBOARD */
  #screen-dashboard { display: none; }

  .dashboard-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 36px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .dashboard-title h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
  }

  .dashboard-title p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .tab {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 12px 24px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* CARDS RESUMO */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
  }

  .summary-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .summary-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--text);
  }

  .summary-value.green { color: var(--accent); }
  .summary-value.red { color: var(--danger); }
  .summary-value.blue { color: var(--accent2); }

  .summary-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* TABELA DE CÁLCULO */
  .calc-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .calc-table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .calc-table-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  .calc-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(42,42,46,0.5);
    font-size: 13px;
  }

  .calc-row:last-child { border-bottom: none; }
  .calc-row.total {
    background: rgba(232,255,71,0.04);
    border-top: 1px solid var(--border);
    font-weight: 500;
  }

  .calc-row-label { color: var(--muted); }
  .calc-row-value { font-weight: 500; }
  .calc-row-value.neg { color: var(--danger); }
  .calc-row-value.pos { color: var(--accent); }
  .calc-row-value.neutral { color: var(--accent2); }

  /* ESCALA / LANÇAMENTO */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .form-input, .form-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--surface2); }

  /* TABELA FALTAS */
  .faltas-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .faltas-table th {
    text-align: left;
    padding: 10px 16px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .faltas-table td {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(42,42,46,0.4);
    vertical-align: middle;
  }

  .faltas-table tr:last-child td { border-bottom: none; }

  .type-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  .type-badge.falta { background: rgba(255,71,71,0.15); color: var(--danger); }
  .type-badge.folga { background: rgba(255,170,71,0.15); color: var(--warn); }
  .type-badge.atestado { background: rgba(71,255,224,0.15); color: var(--accent2); }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .btn-del:hover { color: var(--danger); background: rgba(255,71,71,0.1); }

  /* DIREITOS */
  .direitos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .direito-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 24px;
  }

  .direito-icon {
    font-size: 24px;
    margin-bottom: 12px;
  }

  .direito-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .direito-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .direito-value {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--accent);
  }

  .direito-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ESCALA LANÇADA */
  .escala-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .escala-info-item { text-align: center; }
  .escala-info-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; }
  .escala-info-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--accent);
  }

  /* JANELA INFO */
  .janela-info {
    background: rgba(232,255,71,0.04);
    border: 1px solid rgba(232,255,71,0.15);
    border-radius: 6px;
    padding: 14px 18px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .janela-info strong { color: var(--accent); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 20px;
    font-size: 12px;
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    margin-bottom: 8px;
  }

  .modal p { font-size: 12px; color: var(--muted); margin-bottom: 24px; }

  .loader {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  /* ADMIN ESCALA FORM */
  .admin-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .month-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .month-selector .form-input { max-width: 180px; }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 0 16px; }
    main { padding: 24px 16px; }
    .select-header h1 { font-size: 28px; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">Administrativo Estoque</div>
  <div class="header-right">
    <span class="mode-badge viewer" id="mode-badge">VISUALIZAÇÃO</span>
    <button class="btn-small" id="btn-logout" onclick="logout()" style="display:none">Sair</button>
  </div>
</header>

<!-- TELA SELEÇÃO -->
<main id="screen-select">
  <div class="select-header">
    <h1>Controle de<br><span>Salários</span></h1>
    <p>Selecione o funcionário ou entre como admin</p>
  </div>

  <div class="employee-grid" id="employee-list"></div>

  <div style="text-align:center;">
    <div style="font-size:11px; color:var(--muted); margin-bottom:12px; letter-spacing:0.08em;">ACESSO ADMINISTRATIVO</div>
    <div class="admin-entry">
      <input type="password" id="admin-pw" placeholder="Senha admin" onkeydown="if(event.key==='Enter') adminLogin()">
      <button class="btn-accent" onclick="adminLogin()">Entrar</button>
    </div>
    <div id="pw-error" style="font-size:11px; color:var(--danger); margin-top:8px; display:none;">Senha incorreta</div>
  </div>
</main>

<!-- DASHBOARD -->
<main id="screen-dashboard" style="display:none;">
  <div class="dashboard-header">
    <div class="dashboard-title">
      <h2 id="dash-name"></h2>
      <p id="dash-sub"></p>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;" id="admin-controls"></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('salario', this)">SALÁRIO</button>
    <button class="tab" onclick="switchTab('escala', this)">ESCALA & FALTAS</button>
    <button class="tab" onclick="switchTab('direitos', this)">DIREITOS</button>
  </div>

  <!-- ABA SALÁRIO -->
  <div id="tab-salario">
    <div class="summary-grid" id="salary-summary"></div>
    <div class="calc-table" id="calc-breakdown"></div>
    <div class="calc-table" id="altr-breakdown"></div>
  </div>

  <!-- ABA ESCALA & FALTAS -->
  <div id="tab-escala" style="display:none;">
    <div class="janela-info" id="janela-display"></div>
    <div class="escala-info" id="escala-display"></div>
    <div class="section-title"><div class="dot"></div>Faltas / Folgas / Atestados na Janela</div>
    <div class="calc-table">
      <table class="faltas-table" style="width:100%">
        <thead>
          <tr>
            <th>Data</th>
            <th>Tipo</th>
            <th>Obs</th>
            <th id="th-del" style="display:none"></th>
          </tr>
        </thead>
        <tbody id="faltas-body"></tbody>
      </table>
    </div>

    <!-- FORM ADMIN -->
    <div id="admin-escala-form" style="display:none;">
      <div class="divider"></div>
      <div class="section-title"><div class="dot"></div>Lançar Escala</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Mês de Referência</label>
          <input type="month" class="form-input" id="f-mes-ref">
        </div>
        <div class="form-group">
          <label class="form-label">Dias a Trabalhar</label>
          <input type="number" class="form-input" id="f-dias" min="1" max="31" placeholder="Ex: 20">
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn-accent" onclick="salvarEscala()">Salvar Escala</button>
      </div>

      <div class="divider"></div>
      <div class="section-title"><div class="dot"></div>Registrar Falta / Folga / Atestado</div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" class="form-input" id="f-data">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-select" id="f-tipo">
            <option value="falta">Falta</option>
            <option value="folga">Folga</option>
            <option value="atestado">Atestado</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Observação (opcional)</label>
          <input type="text" class="form-input" id="f-obs" placeholder="Ex: saúde">
        </div>
      </div>
      <div class="admin-actions">
        <button class="btn-accent" onclick="salvarFalta()">Registrar</button>
      </div>
    </div>
  </div>

  <!-- ABA DIREITOS -->
  <div id="tab-direitos" style="display:none;">
    <div class="direitos-grid" id="direitos-grid"></div>
  </div>
</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL LOADING -->
<div class="modal-overlay" id="modal-loading">
  <div style="color:var(--accent); font-size:13px;"><span class="loader"></span> Carregando...</div>
</div>

const AL_DIA = 25.00;
const TR_DIA = 5.90;

// ===================== INSS =====================
function calcINSS(bruto) {
  const faixas = [
    { ate: 1518.00, aliq: 0.075 },
    { ate: 2793.88, aliq: 0.09 },
    { ate: 4190.83, aliq: 0.12 },
    { ate: 8157.41, aliq: 0.14 },
  ];
  let inss = 0, base = bruto;
  let anterior = 0;
  for (const f of faixas) {
    const teto = f.ate;
    if (base <= 0) break;
    const faixa = Math.min(bruto, teto) - anterior;
    if (faixa <= 0) continue;
    inss += faixa * f.aliq;
    anterior = teto;
    if (bruto <= teto) break;
  }
  return Math.min(inss, bruto);
}

// ===================== IRRF =====================
function calcIRRF(bruto, inss) {
  const baseCalc = bruto - inss;
  // Tabela progressiva 2025
  const faixas = [
    { ate: 2259.20, aliq: 0, deducao: 0 },
    { ate: 2826.65, aliq: 0.075, deducao: 169.44 },
    { ate: 3751.05, aliq: 0.15, deducao: 381.44 },
    { ate: 4664.68, aliq: 0.225, deducao: 662.77 },
    { ate: Infinity, aliq: 0.275, deducao: 896.00 },
  ];
  // Desconto simplificado 2025
  const descontoSimplificado = 564.80;
  let irrf = 0;
  for (const f of faixas) {
    if (baseCalc <= f.ate) {
      irrf = baseCalc * f.aliq - f.deducao;
      break;
    }
  }
  // Aplica desconto simplificado se vantajoso
  const irrfComSimplificado = Math.max(0, irrf - descontoSimplificado);
  const irrfFinal = Math.max(0, Math.min(irrf, irrfComSimplificado));
  return irrfFinal;
}

// ===================== JANELA =====================
function getJanela(mesRef) {
  // mesRef = "YYYY-MM" do lançamento (ex: "2025-06")
  const [ano, mes] = mesRef.split('-').map(Number);
  // Mês anterior completo
  const mesAnterior = mes === 1 ? 12 : mes - 1;
  const anoAnterior = mes === 1 ? ano - 1 : ano;
  const inicioJanela = new Date(anoAnterior, mesAnterior - 1, 1);
  // Dia 12 do mês de referência
  const fimJanela = new Date(ano, mes - 1, 12);
  return { inicio: inicioJanela, fim: fimJanela };
}

function dateInJanela(dateStr, mesRef) {
  const { inicio, fim } = getJanela(mesRef);
  const d = new Date(dateStr + 'T12:00:00');
  return d >= inicio && d <= fim;
}

function formatDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}

function mesNome(mesRef) {
  const [ano, mes] = mesRef.split('-').map(Number);
  const nomes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${nomes[mes-1]}/${ano}`;
}

// ===================== CALCULO PRINCIPAL =====================
function calcularSalario(func, escala, faltasJanela) {
  const bruto = func.salario;
  const diasEscala = escala ? escala.dias : 0;
  const diasMes = diasEscala || 30;

  // Separa faltas por tipo
  const faltas = faltasJanela.filter(f => f.tipo === 'falta' || f.tipo === 'folga');
  const atestados = faltasJanela.filter(f => f.tipo === 'atestado');
  const totalFaltas = faltas.length;
  const totalAtestados = atestados.length;
  const totalAbonados = atestados.length;
  const diasDescontados = totalFaltas; // atestado abona salário

  // Salário proporcional
  const salarioProporcional = bruto; // salário cheio (sem desconto de dias ausentes com atestado)
  const descontoFaltas = totalFaltas > 0 ? (bruto / diasMes) * totalFaltas : 0;
  const salarioBrutoFinal = bruto - descontoFaltas;

  // INSS e IRRF sobre bruto final
  const inss = calcINSS(salarioBrutoFinal);
  const irrf = calcIRRF(salarioBrutoFinal, inss);

  // AL+TR
  const totalOcorrencias = totalFaltas + totalAtestados; // ambos descontam AL+TR
  const altr_bruto = diasEscala * (AL_DIA + TR_DIA);
  const altr_desconto = totalOcorrencias * (AL_DIA + TR_DIA);
  const altr_liquido = altr_bruto - altr_desconto;

  const liquido = salarioBrutoFinal - inss - irrf;
  const totalReceber = liquido + altr_liquido;

  return {
    bruto, salarioBrutoFinal, descontoFaltas,
    inss, irrf, liquido,
    diasEscala, totalFaltas, totalAtestados, totalOcorrencias,
    altr_bruto, altr_desconto, altr_liquido,
    totalReceber
  };
}

  const { inicio, fim } = getJanela(mesRef);

  const [anoF, mesF] = [fim.getFullYear(), fim.getMonth()+1];

function renderDireitos(func, mesesTrabalhados) {
  const bruto = func.salario;
  const inss = calcINSS(bruto);
  const liquido = bruto - inss - calcIRRF(bruto, inss);

  const ferias = liquido + (liquido / 3);
  const decimoAcumulado = (bruto / 12) * mesesTrabalhados;
  const fgtsAcumulado = bruto * 0.08 * mesesTrabalhados;

  document.getElementById('direitos-grid').innerHTML = `
    <div class="direito-card">
      <div class="direito-icon">🏖️</div>
      <div class="direito-name">Férias</div>
      <div class="direito-desc">Salário líquido + 1/3 constitucional.<br>Calculado sobre salário bruto menos INSS.</div>
      <div class="direito-value">${fmt(ferias)}</div>
      <div class="direito-sub">Inclui 1/3 = ${fmt(liquido/3)}</div>
    </div>
    <div class="direito-card">
      <div class="direito-icon">🎄</div>
      <div class="direito-name">13º Salário</div>
      <div class="direito-desc">Proporcional aos meses trabalhados no ano.<br>${mesesTrabalhados} mês(es) considerados.</div>

    </div>

      <div class="direito-desc">8% do salário bruto por mês trabalhado.<br>${mesesTrabalhados} mês(es) considerados.</div>

      <div class="direito-sub">${fmt(bruto*0.08)}/mês depositado</div>
    </div>
  `;
}

// ===================== SUPABASE =====================
async function loadData(funcId) {
  showLoading(true);
  try {
    const { data: escalas } = await db
      .from('salarios_escalas')
      .select('*')
      .eq('funcionario_id', funcId)
      .order('mes_ref', { ascending: false });

    const { data: faltas } = await db
      .from('salarios_faltas')
      .select('*')
      .eq('funcionario_id', funcId)
      .order('data', { ascending: true });

    allEscalas = escalas || [];
    allFaltas = faltas || [];
  } catch(e) {
    console.error(e);
    toast('Erro ao carregar dados', 'error');
  }
  showLoading(false);
}

async function salvarEscala() {
  const mesRef = document.getElementById('f-mes-ref').value;
  const dias = parseInt(document.getElementById('f-dias').value);
  if (!mesRef || !dias || dias < 1) { toast('Preencha mês e dias', 'error'); return; }

  showLoading(true);
  const { error } = await db.from('salarios_escalas').upsert({
    funcionario_id: currentFunc.id,
    mes_ref: mesRef,
    dias: dias
  }, { onConflict: 'funcionario_id,mes_ref' });
  showLoading(false);

  if (error) { toast('Erro ao salvar: ' + error.message, 'error'); return; }
  toast('Escala salva!', 'success');
  await loadData(currentFunc.id);
  renderDashboard();
}

async function salvarFalta() {
  const data = document.getElementById('f-data').value;
  const tipo = document.getElementById('f-tipo').value;
  const obs = document.getElementById('f-obs').value;
  if (!data) { toast('Informe a data', 'error'); return; }

  showLoading(true);
  const { error } = await db.from('salarios_faltas').insert({
    funcionario_id: currentFunc.id,
    data, tipo, obs
  });
  showLoading(false);

  if (error) { toast('Erro: ' + error.message, 'error'); return; }
  toast('Registrado!', 'success');
  document.getElementById('f-obs').value = '';
  await loadData(currentFunc.id);
  renderDashboard();
}

async function deletarFalta(id) {
  showLoading(true);
  const { error } = await db.from('salarios_faltas').delete().eq('id', id);
  showLoading(false);
  if (error) { toast('Erro ao deletar', 'error'); return; }
  toast('Removido', 'success');
  await loadData(currentFunc.id);
  renderDashboard();
}

// ===================== NAVEGAÇÃO =====================
function getCurrentMesRef() {
  const now = new Date();
  const mes = String(now.getMonth() + 1).padStart(2, '0');
  return `${now.getFullYear()}-${mes}`;
}

async function openDashboard(func) {
  currentFunc = func;
  document.getElementById('screen-select').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'block';

  document.getElementById('dash-name').textContent = func.nome.split(' ')[0] + ' ' + func.nome.split(' ').slice(-1)[0];
  document.getElementById('dash-sub').textContent = func.nome + ' · ' + (isAdmin ? 'Admin' : 'Visualização');

  if (isAdmin) {
    document.getElementById('mode-badge').className = 'mode-badge admin';
    document.getElementById('mode-badge').textContent = 'ADMIN';
    document.getElementById('btn-logout').style.display = '';

    // Botões admin: trocar funcionário
    document.getElementById('admin-controls').innerHTML = FUNCIONARIOS.map(f =>
      `<button class="btn-small ${f.id===func.id?'active':''}" onclick="openDashboard(FUNCIONARIOS.find(x=>x.id==='${f.id}'))" style="${f.id===func.id?'border-color:var(--accent);color:var(--accent);':''}">${f.nome.split(' ')[0]}</button>`
    ).join('');
  }

  await loadData(func.id);
  renderDashboard();
}

function renderDashboard() {
  const mesRef = getCurrentMesRef();
  const escala = allEscalas.find(e => e.mes_ref === mesRef) || allEscalas[0];
  const escalaRef = escala ? escala.mes_ref : mesRef;

  const faltasJanela = allFaltas.filter(f => dateInJanela(f.data, escalaRef));

  renderSalario(currentFunc, escala, faltasJanela);
  renderEscala(currentFunc, escala, faltasJanela, escalaRef);

  // Meses trabalhados estimado: quantas escalas cadastradas
  const mesesTrabalhados = Math.max(allEscalas.length, 1);
  renderDireitos(currentFunc, mesesTrabalhados);
}

function switchTab(tab, el) {
  ['salario','escala','direitos'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function logout() {
  isAdmin = false;
  currentFunc = null;
  document.getElementById('mode-badge').className = 'mode-badge viewer';
  document.getElementById('mode-badge').textContent = 'VISUALIZAÇÃO';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('screen-dashboard').style.display = 'none';
  document.getElementById('screen-select').style.display = '';
  document.getElementById('admin-controls').innerHTML = '';
  document.getElementById('admin-escala-form').style.display = 'none';
  document.getElementById('admin-pw').value = '';
  renderSelect();
  switchTab('salario', document.querySelector('.tab'));
}

// ===================== UI HELPERS =====================
function fmt(val) {
  return 'R$ ' + val.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.className = 'toast', 3000);
}

function showLoading(show) {
  document.getElementById('modal-loading').classList.toggle('open', show);
}

function adminLogin() {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('pw-error').style.display = 'none';
    openDashboard(FUNCIONARIOS[0]);
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

function renderSelect() {
  const list = document.getElementById('employee-list');
  list.innerHTML = FUNCIONARIOS.map(f => `
    <div class="employee-card" onclick="openDashboard(FUNCIONARIOS.find(x=>x.id==='${f.id}'))">
      <div>
        <div class="employee-name">${f.nome}</div>
        <div class="employee-salary">Salário base: ${fmt(f.salario)}</div>
      </div>
      <div class="card-arrow">→</div>
    </div>
  `).join('');
}
